<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicPocket Audience</title>
    <style>
        :root {
            --bg: #101722;
            --button: #2563eb;
            --button-active: #1d4ed8;
            --ink: #ffffff;
            --muted: #b9c5d6;
            --save: #16a34a;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .viewer {
            width: 100vw;
            height: calc(100vh - 86px);
            display: grid;
            place-items: center;
            overflow: hidden;
            touch-action: none;
        }

        #slideDisplay {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
            user-select: none;
            -webkit-user-drag: none;
            transform-origin: center;
        }

        #notConnectedMsg {
            color: var(--muted);
            font-size: clamp(1rem, 3vw, 1.35rem);
            line-height: 1.5;
            padding: 24px;
            position: absolute;
            text-align: center;
        }

        .save-btn {
            position: fixed;
            right: 18px;
            bottom: 104px;
            z-index: 10;
            background: var(--save);
            color: #ffffff;
            border: 0;
            border-radius: 999px;
            min-width: 56px;
            min-height: 56px;
            padding: 0 20px;
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.26);
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
        }

        .footer {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100vw;
            min-height: 86px;
            display: grid;
            place-items: center;
            gap: 4px;
            background: rgba(16, 23, 34, 0.96);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px;
            z-index: 10;
        }

        .share-link-btn {
            background: var(--button);
            color: #ffffff;
            border: 0;
            border-radius: 999px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 800;
            min-height: 42px;
            padding: 0 20px;
        }

        .share-link-btn:disabled {
            background: #64748b;
            cursor: not-allowed;
        }

        .share-link-btn:active:not(:disabled) {
            background: var(--button-active);
        }

        #sessionIdDisplay {
            color: #c6d3ff;
            font-size: 0.92rem;
        }

        @media (max-width: 700px) {
            .viewer {
                height: calc(100vh - 76px);
            }

            .footer {
                min-height: 76px;
            }

            .save-btn {
                right: 14px;
                bottom: 88px;
                min-width: 50px;
                min-height: 50px;
                padding: 0 16px;
            }
        }
    </style>
    <script defer src="/js/audience.js"></script>
</head>
<body>
    <main class="viewer">
        <img id="slideDisplay" alt="Live presentation slide">
        <div id="notConnectedMsg">Not connected yet.<br>Waiting for presenter...</div>
    </main>

    <button id="saveButton" class="save-btn" type="button">Save</button>

    <footer class="footer">
        <button id="copyLinkButton" class="share-link-btn" type="button">Share Link</button>
        <div id="sessionIdDisplay"></div>
    </footer>
</body>
</html>
