<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicPocket Presenter</title>
    <style>
        :root {
            --accent: #16a34a;
            --accent-dark: #15803d;
            --bg: #eef2f7;
            --danger: #dc2626;
            --danger-dark: #991b1b;
            --ink: #172033;
            --muted: #5f6c80;
            --panel: #ffffff;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --ring: #c8d8f8;
            --shadow: 0 18px 48px rgba(31, 41, 55, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: grid;
            place-items: center;
            padding: 28px;
        }

        button,
        input {
            font: inherit;
        }

        .shell {
            width: min(960px, 100%);
            background: var(--panel);
            border: 1px solid #d8e1ee;
            border-radius: 14px;
            box-shadow: var(--shadow);
            padding: clamp(20px, 4vw, 36px);
        }

        .header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: clamp(1.7rem, 3vw, 2.35rem);
            line-height: 1.05;
            margin: 0 0 10px;
        }

        #status {
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.45;
            margin: 0;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            border: 1px solid var(--ring);
            border-radius: 999px;
            color: var(--primary-dark);
            background: #f8fbff;
            min-height: 38px;
            padding: 7px 13px;
            white-space: nowrap;
        }

        .preview {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 10px;
            border: 1px solid #cfd9e8;
            background: #111827;
            object-fit: contain;
            display: none;
            margin: 0 0 22px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }

        .button {
            border: 0;
            border-radius: 8px;
            color: #ffffff;
            cursor: pointer;
            font-weight: 700;
            min-height: 44px;
            padding: 0 18px;
            transition: transform 0.16s ease, background 0.16s ease, opacity 0.16s ease;
        }

        .button:hover:not(:disabled) {
            transform: translateY(-1px);
        }

        .button:disabled {
            cursor: not-allowed;
            opacity: 0.48;
        }

        .button-primary {
            background: var(--primary);
        }

        .button-primary:hover:not(:disabled) {
            background: var(--primary-dark);
        }

        .button-accent {
            background: var(--accent);
        }

        .button-accent:hover:not(:disabled) {
            background: var(--accent-dark);
        }

        .button-danger {
            background: var(--danger);
        }

        .button-danger:hover:not(:disabled) {
            background: var(--danger-dark);
        }

        .button-secondary {
            background: #64748b;
        }

        .share-grid {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: 24px;
            align-items: center;
            border-top: 1px solid #e4ebf4;
            padding-top: 24px;
        }

        .qr-card {
            display: grid;
            gap: 10px;
            justify-items: center;
            color: var(--muted);
        }

        .qr-frame {
            display: grid;
            place-items: center;
            width: 210px;
            height: 210px;
            border: 1px solid #d6dfed;
            border-radius: 12px;
            background: #ffffff;
        }

        #qrCodeImage {
            width: 180px;
            height: 180px;
        }

        .link-tools {
            min-width: 0;
        }

        .link-tools label {
            color: var(--muted);
            display: block;
            margin-bottom: 8px;
        }

        .copy-row {
            display: flex;
            gap: 10px;
            min-width: 0;
        }

        #joinLinkInput {
            flex: 1;
            min-width: 0;
            border: 1px solid #cfd9e8;
            border-radius: 8px;
            color: var(--ink);
            padding: 0 12px;
            height: 44px;
        }

        #noPermissionMessage {
            color: var(--danger);
            display: none;
            font-weight: 700;
            margin: -8px 0 18px;
        }

        @media (max-width: 720px) {
            body {
                padding: 14px;
            }

            .header,
            .share-grid,
            .copy-row {
                grid-template-columns: 1fr;
                flex-direction: column;
                align-items: stretch;
            }

            .status-pill {
                white-space: normal;
            }

            .button,
            #joinLinkInput {
                width: 100%;
            }
        }
    </style>
    <script defer src="/js/presenter.js"></script>
</head>
<body>
    <main class="shell">
        <header class="header">
            <div>
                <h1>Presenter Dashboard</h1>
                <p id="status">Loading session...</p>
            </div>
            <div id="sessionBadge" class="status-pill">Connecting</div>
        </header>

        <video id="previewVideo" class="preview" autoplay muted playsinline></video>

        <div class="controls">
            <button id="startSharingButton" class="button button-accent" disabled>Start Sharing Screen</button>
            <button id="stopSharingButton" class="button button-danger" disabled>Stop Sharing</button>
            <button id="startNewSessionButton" class="button button-secondary">Start New Session</button>
        </div>

        <p id="noPermissionMessage">Permission denied. Please allow screen sharing.</p>

        <section class="share-grid" aria-label="Audience join information">
            <div class="qr-card">
                <div class="qr-frame">
                    <img id="qrCodeImage" alt="QR code for audience join link">
                </div>
                <span>Scan to join</span>
            </div>

            <div class="link-tools">
                <label for="joinLinkInput">Audience link</label>
                <div class="copy-row">
                    <input id="joinLinkInput" type="text" readonly>
                    <button id="copyLinkButton" class="button button-primary" type="button">Copy</button>
                    <button id="openAudienceButton" class="button button-secondary" type="button">Open</button>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
